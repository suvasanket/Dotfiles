live_config_reload: true
startup_mode: Maximized

mouse:
  hide_when_typing: true

window:
  opacity: 0.77
  blur: true
  padding:
    x: 18
    y: 16
  dynamic_padding: false
  decorations: buttonless
  startup_mode: Maximized

font:
  normal:
    family: "mononoki Nerd Font"
    style: Regular

  bold:
    family: "mononoki Nerd Font"
    style: Bold

  italic:
    family: "mononoki Nerd Font"
    style: Italic

  size: 17.0

cursor:
  blink_timeout: 0
  blink_interval: 400
  style:
    blinking: Always

colors:
  name: Gnometerm
  author: ""
  primary:
    background: "#000000"
    foreground: "#ffffff"
  cursor:
    text: "#000000"
    cursor: "#ffffff"
  normal:
    black: "#000000"
    red: "#cc0000"
    green: "#4e9a06"
    yellow: "#c4a000"
    blue: "#3465a4"
    magenta: "#75507b"
    cyan: "#06989a"
    white: "#d3d7cf"
  bright:
    black: "#555753"
    red: "#ef2929"
    green: "#8ae234"
    yellow: "#fce94f"
    blue: "#729fcf"
    magenta: "#ad7fa8"
    cyan: "#34e2e2"
    white: "#eeeeec"
theme: Gnometerm

alt_send_esc: false

key_bindings:
  # Rename the current tmux window
  - { key: T, mods: Control, chars: "\x02T" }
  - { key: F1, mods: Control, chars: "\x02," }
  # Select a new tmux session for the attached client interactively
  # Select window 1-9
  - { key: A, mods: Command, chars: "ta\n" }
  - { key: Key0, mods: Command, chars: "\x020" }
  - { key: Key1, mods: Command, chars: "\x021" }
  - { key: Key2, mods: Command, chars: "\x022" }
  - { key: Key3, mods: Command, chars: "\x023" }
  - { key: Key4, mods: Command, chars: "\x024" }
  - { key: Key5, mods: Command, chars: "\x025" }
  - { key: Key6, mods: Command, chars: "\x026" }
  - { key: Key7, mods: Command, chars: "\x027" }
  - { key: Key8, mods: Command, chars: "\x028" }
  - { key: Key9, mods: Command, chars: "\x029" }
  - { key: LBracket, mods: Command, chars: "\x02p" }
  - { key: RBracket, mods: Command, chars: "\x02n" }
  - { key: Backslash, mods: Command, chars: "\x02x" }
  - { key: F11, mods: Command, chars: "\x02s" }
  - { key: N, mods: Command, chars: "\x02o" }
  - { key: D, mods: Command, chars: "\x02d" }
  - { key: D, mods: Command|Shift, chars: "\x02W" }
  - { key: P, mods: Command, chars: "\x02w" }
  - { key: E, mods: Command, chars: "\x02T" }
  - { key: G, mods: Command, chars: "\x02[" }
  - { key: Minus, mods: Command, chars: "\x02-" }
  - { key: Backslash, mods: Command|Shift, chars: "\x02_" }
  - { key: N, mods: Command|Shift, chars: "\x02s" }
  - { key: R, mods: Command, chars: "\x02r" }
