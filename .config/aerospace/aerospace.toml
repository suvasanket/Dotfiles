after-startup-command = [
    'exec-and-forget /Users/suvasanketrout/.config/aerospace/scripts/startup_script.sh',
]

on-focus-changed = [
    'exec-and-forget sketchybar --trigger aerospace_focus_change'
]
start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

[gaps]
inner.horizontal = 0
inner.vertical =   0
outer.left =       0
outer.bottom =     14
outer.top =        0
outer.right =      0

[mode.main.binding]
alt-shift-enter = 'layout tiling accordion floating'

ctrl-1 = 'workspace 1'
ctrl-2 = 'workspace 2'
ctrl-3 = 'workspace 3'
ctrl-4 = 'workspace 4'
ctrl-5 = 'workspace 5'

alt-rightSquareBracket = 'workspace next'
alt-leftSquareBracket = 'workspace prev'

cmd-ctrl-rightSquareBracket = ['move-node-to-workspace next', 'workspace next']
cmd-ctrl-leftSquareBracket = [ 'move-node-to-workspace prev', 'workspace prev' ]

cmd-ctrl-1 = 'move-node-to-workspace --focus-follows-window 1'
cmd-ctrl-2 = 'move-node-to-workspace --focus-follows-window 2'
cmd-ctrl-3 = 'move-node-to-workspace --focus-follows-window 3'
cmd-ctrl-4 = 'move-node-to-workspace --focus-follows-window 4'
cmd-ctrl-5 = 'move-node-to-workspace --focus-follows-window 5'

ctrl-cmd-f = 'macos-native-fullscreen'
alt-tab = 'focus-back-and-forth'

##### open apps #####
cmd-enter = ['exec-and-forget open -a Ghostty']
cmd-backslash = ['exec-and-forget open -a Things3']

## APP SPACES
# 1
[[on-window-detected]]
if.app-id = 'net.kovidgoyal.kitty'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id="com.mitchellh.ghostty"
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id="org.gnu.Emacs"
run = ['move-node-to-workspace 1']

# 2
[[on-window-detected]]
if.app-id = 'com.kagi.kagimacOS'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'net.imput.helium'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'org.chromium.Chromium'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'app.zen-browser.zen'
if.window-title-regex-substring = '^(?!.*Extension:)(?!.*Picture-in-Picture).+$'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'com.brave.Browser'
if.window-title-regex-substring = '(.*Brave)$'
run = ['move-node-to-workspace 2']

# 3
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = ['layout floating', 'move-node-to-workspace 3']

# 4
[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = ['move-node-to-workspace 4']

[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'

run = ['move-node-to-workspace 4']
[[on-window-detected]]
if.app-id = 'com.canva.affinity'
run = ['move-node-to-workspace 4']

[[on-window-detected]]
if.app-id = 'org.videolan.vlc'
run = ['layout floating','move-node-to-workspace 4']

[[on-window-detected]]
if.app-id = 'com.colliderli.iina'
run = ['layout floating','move-node-to-workspace 4']

[[on-window-detected]]
if.app-id = 'com.leshko.flap.mac'
run = ['layout floating', 'move-node-to-workspace 4']

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = ['layout floating', 'move-node-to-workspace 4']

# 5

## fallback
[[on-window-detected]]
check-further-callbacks = true
run = ['layout floating']
## APP SPACES
